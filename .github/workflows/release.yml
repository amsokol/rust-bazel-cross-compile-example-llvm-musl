name: Build and Release

on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  test:
    name: Test (${{ matrix.host }})
    runs-on: ${{ matrix.runner }}
    container: ${{ matrix.container || '' }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - host: linux-amd64
            runner: ubuntu-24.04
            container: debian:13
            bazelisk: bazelisk-linux-amd64
          - host: linux-arm64
            runner: ubuntu-24.04-arm
            container: debian:13
            bazelisk: bazelisk-linux-arm64
          - host: macos-arm64
            runner: macos-latest
            bazelisk: bazelisk-darwin-arm64

    steps:
      - name: Install dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          apt-get update
          apt-get install -y --no-install-recommends \
            git ca-certificates curl libxml2

      - name: Install Bazelisk (Linux)
        if: runner.os == 'Linux'
        run: |
          curl -fLo /usr/local/bin/bazel \
            "https://github.com/bazelbuild/bazelisk/releases/latest/download/${{ matrix.bazelisk }}"
          chmod +x /usr/local/bin/bazel

      - name: Install Bazelisk (macOS)
        if: runner.os == 'macOS'
        run: |
          curl -fLo /tmp/bazel \
            "https://github.com/bazelbuild/bazelisk/releases/latest/download/${{ matrix.bazelisk }}"
          sudo install /tmp/bazel /usr/local/bin/bazel

      - name: Checkout
        uses: actions/checkout@v5

      - name: Build all targets
        run: bazel build //...

  release:
    name: Release ${{ matrix.target }}
    if: github.event_name == 'release'
    needs: test
    runs-on: ubuntu-24.04
    container:
      image: debian:13

    strategy:
      fail-fast: false
      matrix:
        include:
          - target: hello_world_amd64
            artifact: hello_world-linux-amd64
          - target: hello_world_amd64_v2
            artifact: hello_world-linux-amd64-v2
          - target: hello_world_amd64_v3
            artifact: hello_world-linux-amd64-v3
          - target: hello_world_amd64_v4
            artifact: hello_world-linux-amd64-v4
          - target: hello_world_arm64
            artifact: hello_world-linux-arm64

    steps:
      - name: Install dependencies
        run: |
          apt-get update
          apt-get install -y --no-install-recommends \
            git ca-certificates curl libxml2

      - name: Install Bazelisk
        run: |
          curl -Lo /usr/local/bin/bazel \
            https://github.com/bazelbuild/bazelisk/releases/latest/download/bazelisk-linux-amd64
          chmod +x /usr/local/bin/bazel

      - name: Checkout
        uses: actions/checkout@v5

      - name: Build
        run: bazel build //rust/hello_world:${{ matrix.target }}

      - name: Prepare artifact
        run: cp bazel-bin/rust/hello_world/${{ matrix.target }} ${{ matrix.artifact }}

      - name: Upload release assets
        if: github.event_name == 'release'
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          echo "Uploading ${{ matrix.artifact }}..."
          curl -sL --fail-with-body \
            -X POST \
            -H "Authorization: token $GITHUB_TOKEN" \
            -H "Content-Type: application/octet-stream" \
            --data-binary @"${{ matrix.artifact }}" \
            "https://uploads.github.com/repos/${{ github.repository }}/releases/${{ github.event.release.id }}/assets?name=${{ matrix.artifact }}"
